          description: Job enabled successfully
          
  /v1/continuity/jobs/{id}/disable:
    post:
      operationId: disableScheduledJob
      summary: Disable an active scheduled job
      description: Suspends a cron job without deleting its configuration.
      tags: [Continuity]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job disabled successfully

  /v1/benchmarks:
    get:
      operationId: listBenchmarks
      summary: List all benchmark results
      description: Returns a paginated list of historical benchmark runs.
      tags: [Benchmarks]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of benchmark results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BenchmarkResult'
    post:
      operationId: createBenchmark
      summary: Record a new benchmark result
      description: Saves a performance benchmark result to the persistent store.
      tags: [Benchmarks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BenchmarkResult'
      responses:
        '201':
          description: Benchmark result recorded
        '400':
          description: Invalid request body

  /v1/benchmarks/{test_id}:
    get:
      operationId: getBenchmarkHistory
      summary: Get history for a specific benchmark test
      description: Returns the last 10 runs of a specific test ID for comparison.
      tags: [Benchmarks]
      parameters:
        - name: test_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of historical results for the test
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BenchmarkResult'
        '404':
          description: Test ID not found
    post:
      operationId: triggerBenchmark
      summary: Trigger a real-time benchmark
      description: Executes a specific benchmark test and returns the result.
      tags: [Benchmarks]
      parameters:
        - name: test_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Benchmark executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Test ID not found


  /v1/skills/manifests:
    get:
      operationId: listSkillManifests
      summary: List Skill Manifests
      description: Returns all declarative skill manifests (built-in and local).
      tags: [Skills]
      responses:
        '200':
          description: List of skill manifests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillManifest'

  /v1/skills/manifests/{name}:
    get:
      operationId: getSkillManifest
      summary: Get Skill Manifest
      description: Returns a single declarative skill manifest by name.
      tags: [Skills]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill manifest found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillManifest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/api/pull:
    post:
      operationId: proxyModelPull
      summary: Proxy Model Pull
      description: High-level proxy to pull models to the primary engine node.
      tags: [Infrastructure]
      responses:
        '202':
          description: Pull initiated

  /v1/infra/providers/{id}/sync:
    post:
      operationId: syncProviderModels
      summary: Discover & Sync Models (IMR-01)
      description: |
        Triggers the Intelligent Model Registry discovery process. 
        Pings the provider, fetches available nodes, and auto-populates 
        the registry with inferred capabilities.
      tags: [Infrastructure]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The local provider identifier.
      responses:
        '200':
          description: Registry synchronized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  synced_count: { type: integer, example: 5 }
        '404':
          description: Provider not found
        '500':
          description: Remote discovery failure

responses:
  Unauthorized:
    description: Unauthorized — missing or invalid Bearer token
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/ProblemDetails'
