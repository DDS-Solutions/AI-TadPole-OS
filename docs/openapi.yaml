openapi: 3.1.0
info:
  title: Tadpole OS Engine API
  version: 1.1.38
  description: |
    All primary business endpoints (agents, oversight, infrastructure, benchmarks, MCP)
    are versioned under the `/v1/` prefix. Engine-level control routes (health, 
    deploy, kill, shutdown, ws, audio) are available at both the root level and 
    nested under `/v1/engine/` for consistent client-side orchestration.
    All list endpoints return paginated responses. Errors follow RFC 9457.
  contact:
    name: Tadpole OS
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Local Development
  - url: http://remote-engine.tadpole.local:8000
    description: Swarm Bunker (Tailscale)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: NEURAL_TOKEN from the .env file

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number (1-indexed).
    PerPageParam:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
      description: Items per page. Clamped to 1–100.

  schemas:
    EngineAgent:
      type: object
      description: Represents a registered agent in the swarm.
      required: [id, name, role, department, status]
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Agent of Nine"
        role:
          type: string
          example: "CEO"
        department:
          type: string
          example: "Executive"
        status:
          type: string
          enum: [idle, thinking, active, paused]
        model_id:
          type: ['string', 'null']
        budget_usd:
          type: number
          format: double
        cost_usd:
          type: number
          format: double
        skills:
          type: array
          items:
            type: string
        workflows:
          type: array
          items:
            type: string
        mcp_tools:
          type: array
          items:
            type: string
        failure_count:
          type: integer
          description: Number of consecutive failures before throttling.
          example: 0
        last_failure_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last recorded failure.
        category:
          type: string
          enum: [user, ai]
          description: Categorization for UI filtering and registry placement.
        requires_oversight:
          type: boolean
          description: Toggle for manual gate enforcement.
        working_memory:
          type: object
          description: Initial working memory state.
          default: false

    RoleBlueprint:
      type: object
      description: Reusable agent configuration template for governance modeling.
      required: [id, name, department, description]
      properties:
        id:
          type: string
        name:
          type: string
        department:
          type: string
        description:
          type: string
        skills:
          type: string
          description: Multiline string or comma-separated list of required skill names.
        workflows:
          type: string
          description: Multiline string or comma-separated list of workflow IDs.
        mcpTools:
          type: string
          description: Multiline string or comma-separated list of MCP tool names.
        requiresOversight:
          type: boolean
          default: true
        modelId:
          type: ['string', 'null']
        createdAt:
          type: ['string', 'null']
          format: date-time

    TaskPayload:
      type: object
      description: Payload for dispatching a task to an agent.
      required: [message]
      properties:
        message:
          type: string
        cluster_id:
          type: ['string', 'null']
        department:
          type: string
        provider:
          type: string
        model_id:
          type: string
        api_key:
          type: ['string', 'null']
        base_url:
          type: ['string', 'null']
        rpm:
          type: ['integer', 'null']
        tpm:
          type: ['integer', 'null']
        budget_usd:
          type: number
          format: double
        swarm_depth:
          type: integer
          default: 0
        swarm_lineage:
          type: array
          items:
            type: string
        external_id:
          type: ['string', 'null']
        analysis:
          type: boolean
          default: false
          description: |
            If true, triggers a Mission Analysis (Agent 99) sub-mission upon completion. 
            NOTE: The engine implements Autonomic Self-Healing; if an OOM is detected, 
            it automatically fallbacks to :q4_K_M quantization and retries.
          
    VoiceRequest:
      type: object
      description: Request payload for text-to-speech synthesis.
      required: [text]
      properties:
        text:
          type: string
          example: "Neural uplink established."
        voice:
          type: string
          default: "onyx"
        model:
          type: string
          default: "tts-1"

    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs.
      properties:
        type:
          type: string
          format: uri
          example: "https://tadpole.os/errors/404"
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        message:
          type: string
          description: Backward-compatible alias for detail

    OversightEntry:
      type: object
      description: An oversight governance entry awaiting or recording a decision.
      properties:
        id:
          type: string
        agent_id:
          type: string
        tool_name:
          type: string
        args:
          type: object
        decision:
          type: ['string', 'null']
          enum: [pending, approved, rejected, null]

    HATEOASLink:
      type: object
      description: A HATEOAS hypermedia link.
      properties:
        href:
          type: string
          description: The URI of the linked resource.
        method:
          type: string
          description: The HTTP method for the link.

    PaginatedResponse:
      type: object
      description: Standard paginated response envelope with HATEOAS navigation links.
      required: [data, page, per_page, total, total_pages]
      properties:
        data:
          type: array
          items:
            type: object
          description: Array of resources for the current page.
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 25
        total:
          type: integer
          example: 42
        total_pages:
          type: integer
          example: 2
        _links:
          type: object
          description: HATEOAS navigation links for pagination.
          properties:
            self:
              $ref: '#/components/schemas/HATEOASLink'
            first:
              $ref: '#/components/schemas/HATEOASLink'
            next:
              $ref: '#/components/schemas/HATEOASLink'
            last:
              $ref: '#/components/schemas/HATEOASLink'
            prev:
              $ref: '#/components/schemas/HATEOASLink'

    McpTool:
      type: object
      description: A Model Context Protocol tool definition with real-time telemetry.
      required: [name, description, source]
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          description: JSON Schema for the tool's expected arguments.
        source:
          type: string
          example: "system"
        stats:
          $ref: '#/components/schemas/McpToolStats'

    McpToolStats:
      type: object
      description: Real-time telemetry for an MCP tool.
      required: [total_invocations, successful_invocations, failed_invocations, avg_latency_ms]
      properties:
        total_invocations:
          type: integer
        successful_invocations:
          type: integer
        failed_invocations:
          type: integer
        avg_latency_ms:
          type: number
          format: double
        last_executed_at:
          type: string
          format: date-time
          nullable: true
    BenchmarkResult:
      type: object
      description: A recorded performance benchmark result.
      required: [id, name, category, test_id, mean_ms, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Token Latency Test"
        category:
          type: string
          example: "LLM Performance"
        test_id:
          type: string
          example: "gemini-flash-p95"
        mean_ms:
          type: number
          format: double
        p95_ms:
          type: number
          format: double
          nullable: true
        p99_ms:
          type: number
          format: double
          nullable: true
        target_value:
          type: string
          nullable: true
        status:
          type: string
          enum: [PASS, FAIL, NEEDS_INVESTIGATION]
        metadata:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    SystemDefense:
      type: object
      description: Real-time hardware-level security and performance telemetry.
      properties:
        ram_pressure:
          type: number
          format: double
          description: Percentage of host RAM in use.
        cpu_load:
          type: number
          format: double
          description: Percentage of host CPU load.
        sandbox_type:
          type: string
          example: "Docker"
        is_sandboxed:
          type: boolean

    SecurityIntegrityResponse:
      type: object
      description: Outcome of the Merkle Chain health check.
      properties:
        status:
          type: string
          example: "Verified"
        score:
          type: number
          format: double
          example: 100.0
        chain_length:
          type: integer
          example: 1450
        verified_at:
          type: string
          format: date-time

    SecurityQuotaResponse:
      type: object
      description: Combined budget and system defense telemetry.
      properties:
        budget:
          type: object
          properties:
            total_usd: { type: number, format: double }
            remaining_usd: { type: number, format: double }
            reset_at: { type: string, format: date-time }
        system_defense:
          $ref: '#/components/schemas/SystemDefense'

    UpdatePolicyPayload:
      type: object
      required: [tool_name, mode]
      properties:
        tool_name:
          type: string
          example: "run_command"
        mode:
          type: string
          enum: [allow, deny, prompt]
          example: "prompt"

    McpToolsList:
      type: array
      items:
        $ref: '#/components/schemas/McpTool'
      example:
        - name: "list_file_symbols"
          description: "Lists symbols via Hydra-RS"
        - name: "get_symbol_body"
          description: "Retrieves symbol source"

    SkillManifest:
      type: object
      description: A declarative definition for an agent skill with Sapphire safety constraints.
      required: [schema_version, name, description, version, danger_level]
      properties:
        schema_version: { type: string, example: "1" }
        name: { type: string }
        display_name: { type: string, nullable: true }
        description: { type: string }
        version: { type: string, example: "1.0.0" }
        author: { type: string, nullable: true }
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        toolset_group: { type: string, nullable: true }
        danger_level:
          $ref: '#/components/schemas/DangerLevel'
        requires_oversight:
          type: boolean
          default: false
        parameters:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SkillParameter'
        hooks:
          type: object
          nullable: true
          properties:
            before_execute: { type: string, nullable: true }
            after_execute: { type: string, nullable: true }
        category:
          type: string
          default: "user"

    SkillParameter:
      type: object
      required: [type]
      properties:
        type: { type: string }
        required: { type: boolean, nullable: true }
        default: { type: object, nullable: true }

    DangerLevel:
      type: string
      enum: [low, medium, high, critical]

    Permission:
      type: string
      enum:
        - "network:outbound"
        - "filesystem:read"
        - "filesystem:write"
        - "shell:execute"
        - "budget:spend"

    ScheduledJob:
      type: object
      description: An autonomous scheduled background mission (Continuity Scheduler).
      required: [id, name, cron_schedule, mission_payload, is_active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cron_schedule:
          type: string
          example: "0 * * * *"
        mission_payload:
          $ref: '#/components/schemas/TaskPayload'
        is_active:
          type: boolean
          default: true
        budget_usd:
          type: number
          format: double
        cost_usd:
          type: number
          format: double
        failed_runs:
          type: integer
          default: 0
        max_failures:
          type: integer
          default: 3

    SwarmNode:
      type: object
      description: A discovered or registered Bunker node in the local swarm.
      properties:
        id: { type: string }
        name: { type: string }
        address: { type: string }
        status: { type: string, enum: [online, offline, throttled] }
        last_seen: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: { type: string }
        _links:
          type: object
          properties:
            self: { $ref: '#/components/schemas/HATEOASLink' }
            pull: { $ref: '#/components/schemas/HATEOASLink' }

    SwarmGraph:
      type: object
      description: A unified graph representation of agents, missions, and relationships.
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'

    GraphNode:
      type: object
      required: [id, label, type, status, metadata]
      properties:
        id: { type: string }
        label: { type: string }
        type: { type: string, enum: [agent, mission, resource] }
        status: { type: string }
        metadata: { type: object }

    GraphEdge:
      type: object
      required: [id, source, target, label, metadata]
      properties:
        id: { type: string }
        source: { type: string }
        target: { type: string }
        label: { type: string }
        metadata: { type: object }

    ModelCatalogEntry:
      type: object
      description: A model available for download via the Model Store.
      properties:
        id: { type: string }
        name: { type: string }
        provider: { type: string }
        vram_required_gb: { type: number, format: double }
        description: { type: string }
    RegisterCapabilityResponse:
      type: object
      properties:
        status:
          type: string
          example: "registered"
        name:
          type: string
          example: "my_new_skill"

    CapabilityImportResponse:
      type: object
      required: [type, data, preview]
      properties:
        type:
          type: string
          enum: [skill, workflow, hook]
        data:
          type: object
          description: The structured definition (SkillDefinition, WorkflowDefinition, or HookDefinition).
        preview:
          type: string
          description: The raw content of the imported file for visual verification.

    RegisterCapabilityRequest:
      type: object
      required: [type, data, category]
      properties:
        type:
          type: string
          enum: [skill, workflow, hook]
        data:
          oneOf:
            - $ref: '#/components/schemas/SkillDefinition'
            - $ref: '#/components/schemas/WorkflowDefinition'
            - $ref: '#/components/schemas/HookDefinition'
        category:
          type: string
          enum: [user, ai]

    SkillDefinition:
      type: object
      required: [name, description, execution_command]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        execution_command: { type: string }
        schema: { type: object, description: "JSON Schema for skill arguments" }
        oversight_required: { type: boolean, default: true }
        doc_url: { type: string, nullable: true }
        tags: { type: array, items: { type: string } }
        full_instructions: { type: string, nullable: true }
        category: { type: string, default: "user" }

    WorkflowDefinition:
      type: object
      required: [name, content]
      properties:
        id: { type: string }
        name: { type: string }
        content: { type: string }
        doc_url: { type: string, nullable: true }
        tags: { type: array, items: { type: string } }
        category: { type: string, default: "user" }

    HookDefinition:
      type: object
      required: [name, description, hook_type, content]
      properties:
        name: { type: string }
        description: { type: string }
        hook_type: { type: string, example: "post-tool" }
        content: { type: string }
        active: { type: boolean, default: true }
        category: { type: string, default: "user" }

    ProviderConfig:
      type: object
      required: [id, name, protocol]
      properties:
        id: { type: string }
        name: { type: string }
        icon: { type: string, nullable: true }
        api_key: { type: string, nullable: true }
        base_url: { type: string, nullable: true }
        protocol:
          type: string
          enum: [openai, anthropic, google, ollama, xai, deepseek, inception]
        external_id: { type: string, nullable: true }
        custom_headers:
          type: object
          additionalProperties: { type: string }
        default_config:
          $ref: '#/components/schemas/ModelConfig'
        audio_model: { type: string, nullable: true }

    ModelEntry:
      type: object
      required: [id, name, provider_id]
      properties:
        id: { type: string }
        name: { type: string }
        provider_id: { type: string }
        modality:
          type: string
          enum: [text, vision, multimodal, audio]
        max_tokens: { type: integer, nullable: true }
        context_window: { type: integer, nullable: true }
        cost_per_1k_tokens: { type: number, format: double, nullable: true }
        capabilities:
          $ref: '#/components/schemas/ModelCapabilities'

    ModelCapabilities:
      type: object
      description: Automated capability metadata inferred by the IMR-01 engine.
      properties:
        supports_vision: { type: boolean, default: false }
        supports_tools: { type: boolean, default: false }
        supports_reasoning: { type: boolean, default: false }
        context_window: { type: integer, nullable: true }

    ModelConfig:
       type: object
       properties:
         temperature: { type: number, format: double }
         top_p: { type: number, format: double }
         max_tokens: { type: integer, nullable: true }
         presence_penalty: { type: number, format: double }
         frequency_penalty: { type: number, format: double }
         stop_sequences: { type: array, items: { type: string } }
         extra_parameters:
           type: object
           additionalProperties: { type: object }

paths:
  /v1/engine/health:
    get:
      operationId: getEngineHealth
      summary: Engine Terminal Diagnostics
      description: Returns 200 OK with realtime engine diagnostics.
      security: []
      tags: [Engine]
      responses:
        '200':
          description: Engine is healthy

  /v1/engine/ws:
    get:
      operationId: engineWs
      summary: WebSocket Hub
      responses:
        '101': { description: Switching Protocols }

  /v1/engine/live-voice:
    get:
      operationId: engineLiveVoice
      summary: Gemini Multimodal Live WebSocket
      description: |
        Upgrades the connection to a persistent WebSocket for real-time 
        multimodal interaction with Gemini 3 Pro/Flash. 
        Requires 'bearer.<token>' subprotocol for authentication in the browser.
      tags: [Engine]
      responses:
        '101': { description: Switching Protocols }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/engine/health:
    get:
      $ref: '#/paths/~1v1~1health'

  /v1/engine/deploy:
    post:
      operationId: engineDeploy
      summary: Trigger Deployment
      description: Triggers a production deployment via PowerShell.
      tags: [Engine]
      responses:
        '202': { description: Deployment initiated }

  /v1/engine/kill:
    post:
      operationId: engineKill
      summary: Kill All Agents
      description: Halts all running agents. Server remains online.
      tags: [Engine]
      responses:
        '200': { description: Agents halted }

  /v1/engine/transcribe:
    post:
      operationId: engineTranscribe
      summary: Audio Transcription
      description: Transcribes audio via Groq Whisper (Cloud). Local Whisper is experimental.
      tags: [Engine]
      responses:
        '200': { description: Transcription successful }

  /v1/engine/speak:
    post:
      operationId: engineSpeak
      summary: Text-to-Speech Synthesis
      description: Synthesizes text to high-fidelity audio using the server-side TTS engine.
      tags: [Engine]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceRequest'
      responses:
        '200':
          description: Audio stream returned
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid text provided
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/engine/shutdown:
    post:
      operationId: engineShutdown
      summary: Graceful Shutdown
      description: Graceful server shutdown. Persists state before exit.
      tags: [Engine]
      responses:
        '200': { description: Shutdown sequence initiated }

  /v1/system/compute-profile:
    get:
      operationId: getComputeProfile
      summary: Get Hardware Telemetry
      description: Returns real-time CPU and RAM usage from the host system.
      tags: [System]
      responses:
        '200':
          description: Hardware profile returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_usage: { type: number, format: double }
                  memory_usage_mb: { type: number, format: double }
                  memory_total_mb: { type: number, format: double }
                  timestamp: { type: string, format: date-time }

  /v1/agents:
    get:
      operationId: listAgents
      summary: List all agents
      description: Returns a paginated list of all registered agents from DashMap and DB.
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of registered agents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EngineAgent'
        '401':
          description: Unauthorized — missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createAgent
      summary: Create a new agent
      description: Creates or registers a new agent. Returns 201 with a Location header.
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineAgent'
      responses:
        '201':
          description: Agent created
          headers:
            Location:
              schema:
                type: string
              description: URI of the newly created agent
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/agents/graph:
    get:
      operationId: getSwarmGraph
      summary: Get Swarm Knowledge Graph
      description: Retrieves the complete graph of agents, missions, and active relationships.
      tags: [Agents]
      responses:
        '200':
          description: Complete swarm graph returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmGraph'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/agents/{id}/tasks:
    post:
      operationId: sendAgentTask
      summary: Send a task to an agent
      description: Dispatches a task resource to the agent for async processing. Returns 202 Accepted.
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          description: The unique agent identifier.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPayload'
      responses:
        '202':
          description: Task accepted for async processing
        '404':
          description: Agent not found
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/agents/{id}/pause:
    post:
      operationId: pauseAgent
      summary: Pause Agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Agent paused }

  /v1/agents/{id}/resume:
    post:
      operationId: resumeAgent
      summary: Resume Agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Agent resumed }
 
  /v1/agents/{id}/reset:
    post:
      operationId: resetAgent
      summary: Reset Agent Failure Count
      description: Resets an agent's failure count and returns it to idle status.
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
