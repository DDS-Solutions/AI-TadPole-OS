name: Build Tadpole OS — Separate Packages

on:
  push:
    tags:
      - 'v*' # Run on version tags
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-x86_64"
            os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
          - platform: "linux-x86_64"
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server-rs -> target
            src-tauri -> target

      - name: Install Linux Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler \
            libprotobuf-dev

      - name: Install dependencies
        run: npm ci

      # 1. Build the sidecar (server-rs)
      - name: Build Sidecar (server-rs)
        working-directory: server-rs
        run: cargo build --release --target ${{ matrix.target }}

      # 2. Rename and move the sidecar for Tauri
      - name: Prepare Sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          cp server-rs/target/${{ matrix.target }}/release/server-rs${{ matrix.suffix }} \
             src-tauri/bin/server-rs-${{ matrix.target }}${{ matrix.suffix }}

      # 3. Build the Tauri App
      - name: Build Tauri Bundle
        run: npm run tauri:build

      # 4. Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tadpole-os-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
