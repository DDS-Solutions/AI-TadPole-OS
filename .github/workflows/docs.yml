name: Deploy VitePress Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'index.html'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit

      - name: Build docs
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.repository == 'DDS-Solutions/Tadpole-OS' || github.repository == 'DDS-Solutions/TadPole-OS' || github.repository == 'DDS-Solutions/AI-Tadpole-OS'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
